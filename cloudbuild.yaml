steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--set-secrets"
      - "DATABASE_URL=periwink-database-url:latest,NEXTAUTH_SECRET=periwink-nextauth-secret:latest,RESEND_API_KEY=periwink-resend-api-key:latest,ADMIN_SECRET=periwink-admin-secret:latest,ANTHROPIC_API_KEY=periwink-anthropic-key:latest"
      - "--add-cloudsql-instances"
      - "${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE}"
      - "--vpc-connector"
      - "periwink-connector"

substitutions:
  _REGION: us-east1
  _REPO_NAME: periwink
  _SERVICE_NAME: periwink
  _CLOUD_SQL_INSTANCE: periwink-db

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}"
